<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Login Form</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#07131d;
    overflow:hidden;
}

/* Main Box */

.container{
    position:relative;
    width:950px;
    height:500px;
    background:#e3a178;
    border-radius:15px;
    overflow:hidden;
    border:3px solid white;
}

/* ================= CHARACTER ================= */

.character{
    position:absolute;
    width:180px;
    bottom:40px;
    left:-220px;

    animation:walk 7s linear forwards;
}

/* Walking Animation */

@keyframes walk{

    0%{
        left:-220px;
        transform:translateY(0px);
    }

    10%{
        transform:translateY(-5px);
    }

    20%{
        transform:translateY(0px);
    }

    30%{
        transform:translateY(-5px);
    }

    40%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-5px);
    }

    60%{
        transform:translateY(0px);
    }

    70%{
        transform:translateY(-5px);
    }

    100%{
        left:220px;
        transform:translateY(0px);
    }

}

/* ================= BAG ================= */

.bag{
    position:absolute;
    width:60px;
    height:50px;
    background:#5b3722;
    border-radius:8px;

    left:300px;
    bottom:70px;

    opacity:0;

    animation:dropBag 1s forwards;
    animation-delay:7s;
}

/* Bag Handle */

.bag::before{
    content:'';
    position:absolute;

    width:25px;
    height:12px;

    border:4px solid #5b3722;
    border-bottom:none;

    border-radius:10px 10px 0 0;

    top:-12px;
    left:14px;
}

/* Bag Drop Animation */

@keyframes dropBag{

    0%{
        transform:translateY(-100px);
        opacity:0;
    }

    100%{
        transform:translateY(0px);
        opacity:1;
    }

}

/* ================= LOGIN FORM ================= */

.form-box{
    position:absolute;

    top:50%;
    right:80px;

    width:320px;

    transform:translateY(-50%) scale(0.4);

    opacity:0;

    animation:showForm 1.5s forwards;
    animation-delay:8s;
}

/* Form Animation */

@keyframes showForm{

    from{
        opacity:0;
        transform:translateY(-50%) scale(0.4);
    }

    to{
        opacity:1;
        transform:translateY(-50%) scale(1);
    }

}

.form-box h2{
    color:white;
    text-align:center;
    margin-bottom:20px;
    font-size:34px;
}

.input-box{
    margin:15px 0;
}

.input-box input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:8px;
    outline:none;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;

    border:none;
    border-radius:8px;

    background:#ff315c;
    color:white;

    font-size:18px;
    cursor:pointer;

    transition:0.3s;
}

button:hover{
    background:#ff003c;
}

.text{
    text-align:center;
    color:white;
    margin-top:15px;
}

</style>
</head>

<body>

<div class="container">

    <!-- Animated Character -->
    <img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png"
    class="character">

    <!-- Bag -->
    <div class="bag"></div>

    <!-- Login Form -->
    <div class="form-box">

        <h2>Register Now</h2>

        <div class="input-box">
            <input type="text" placeholder="Username">
        </div>

        <div class="input-box">
            <input type="password" placeholder="Password">
        </div>

        <button>NEXT</button>

        <div class="text">
            Welcome Back
        </div>

    </div>

</div>

</body>
</html>
